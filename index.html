<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CI/CD Demo</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f6f7fb;
        --card: #ffffff;
        --text: #101828;
        --muted: #475467;
        --accent: #1d4ed8;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: radial-gradient(circle at top, #ffffff 0%, var(--bg) 55%, #e9eef8 100%);
        color: var(--text);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }

      .card {
        background: var(--card);
        padding: 32px 28px;
        border-radius: 16px;
        box-shadow: 0 18px 45px rgba(15, 23, 42, 0.12);
        max-width: 640px;
        width: 100%;
        text-align: center;
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(1.75rem, 2vw + 1rem, 2.5rem);
        color: var(--accent);
      }

      p {
        margin: 0;
        font-size: 1.05rem;
        line-height: 1.6;
        color: var(--muted);
      }

      .badge {
        display: inline-block;
        margin-top: 16px;
        padding: 8px 14px;
        border-radius: 999px;
        background: rgba(29, 78, 216, 0.1);
        color: var(--accent);
        font-weight: 600;
        font-size: 0.85rem;
        letter-spacing: 0.02em;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Hello from Jenkins + Docker Deployment</h1>
      <p>
        This static page was deployed using GitHub for source control, Jenkins for
        CI/CD automation, and Docker for a lightweight, repeatable runtime.
      </p>
      <div class="badge">CI/CD Demo</div>
    </main>
  </body>
</html>
